model_id: "Qwen/Qwen2.5-0.5B-Instruct"
data_train_path: "data/sample_train.jsonl"
data_eval_path: "data/sample_eval.jsonl"
output_dir: "outputs"
run_name: "qwen25-05b-local-lora"
seed: 42

max_seq_len: 1024
micro_batch_size: 1
grad_accum_steps: 16
num_epochs: 1.0
learning_rate: 0.0002
warmup_ratio: 0.03
weight_decay: 0.0
lr_scheduler: "cosine"
max_steps: -1
eval_strategy: "steps"
save_steps: 25
eval_steps: 25
logging_steps: 5

use_qlora: true
load_in_4bit: true
bnb_4bit_quant_type: "nf4"
bnb_4bit_compute_dtype: "float16"
gradient_checkpointing: true
bf16: false
fp16: false

lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules: null
packing: false
eval_split_ratio: 0.1
system_prompt: "You are a helpful assistant."
resume_from_checkpoint: null

wandb_project: null
wandb_entity: null
wandb_api_key: null
hf_token: null
push_to_hub: false
hub_repo_id: null
hub_private: true
hub_auto_tag: true
hub_tag_prefix: "run"
trust_remote_code: false
attn_implementation: null
